channels:
- pytorch
- nvidia
- conda-forge
- defaults
dependencies:
- ase>=3.22
- autopep8
- pip
- python=3.12.*
- pytorch>=2.1.0
- pytorch-cuda=11.8  # or 12.1 for CUDA 12.x
- pytorch-lightning>=2.1.0
- seaborn
- tqdm
- pip:
  # Install PyTorch Geometric and extensions AFTER PyTorch is installed
  # Use PyPI index that matches PyTorch CUDA version
  - torch-geometric>=2.5.0
  - higher==0.2.1
  - hydra-core>=1.3.0
  - hydra-joblib-launcher>=1.2.0
  - p-tqdm>=1.3.3
  - pytest
  - python-dotenv
  - smact>=2.2.1
  - streamlit>=0.79.0
  - torchdiffeq>=0.0.1
  - wandb>=0.16.0
  - pyshtools>=4.10.1
  - pyxtal>=0.5.2
  - chemparse>=0.1.2
  - einops>=0.6.0
  - pymatgen>=2024.1.0
  - matminer>=0.9.0
  - torchmetrics>=1.2.0
  - pandas
  - imageio
  - setuptools>=68.2.2  # Required for Python 3.12 (replaces distutils)
  # Install torch-geometric extensions separately after main packages
  # These will be installed after env creation via separate pip install
name: diffcsp_env